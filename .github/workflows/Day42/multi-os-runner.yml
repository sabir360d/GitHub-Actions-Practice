name: Multi OS Test # Multi OS Test Workflow

on: [push]

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print Details
        run: |
          echo "OS: Ubuntu"
          hostname
          whoami

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Print Details
        run: |
          echo OS: Windows
          hostname
          whoami

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print Details
        run: |
          echo "OS: macOS"
          hostname
          whoami