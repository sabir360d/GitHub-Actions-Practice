name: Docker Build & Push

on:
  push:
    branches:
      - main
      - feature/*   # build will run here but push won't

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Get code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set short SHA
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 3. Login to Docker Hub (only needed for push)
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 4. Build image (always runs)
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:latest .

      # 5. Tag with SHA
      - name: Tag Image
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/my-app:latest \
          ${{ secrets.DOCKER_USERNAME }}/my-app:sha-${{ env.SHORT_SHA }}

      # 6. Push (ONLY on main)
      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:sha-${{ env.SHORT_SHA }}