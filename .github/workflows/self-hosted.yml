name: Self Hosted Runner Test

on:
  workflow_dispatch:

jobs:
  self-hosted-job:
    runs-on: self-hosted

    steps:
      - name: Print System Info
        run: |
          echo "OS: $(uname -a)"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"

      - name: Print Working Directory
        run: |
          pwd

      - name: Create File
        run: |
          echo "Hello from self-hosted runner" > test-file.txt
          ls -la