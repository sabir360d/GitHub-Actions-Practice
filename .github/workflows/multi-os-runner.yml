name: Multi-OS Runner Demo

on:
  push:
    branches: [ main ]

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print System Info
        run: |
          echo "OS: $(uname -a)"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Print System Info
        run: |
          echo OS: %OS%
          hostname
          echo User: %USERNAME%

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print System Info
        run: |
          echo "OS: $(uname -a)"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"